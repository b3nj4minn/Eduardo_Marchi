<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marchi & Cía — Inicio</title>
  <meta name="description" content="Marchi & Cía es una firma boutique dedicada a controversias civiles y comerciales de alta complejidad.">
  <meta name="theme-color" content="#020617">
  
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* ==========================================================================
       MARCHI & CÍA - HIGH-END BOUTIQUE LAW FIRM STYLES (INTACTO)
       ========================================================================== */
    
    :root {
      --color-bg-body: #f8fafc; 
      --color-bg-card: #ffffff;
      --color-bg-dark: #0f172a; 
      --color-bg-darker: #020617; 
      --color-steel-blue: #1e293b; 
      
      --color-text-main: #0f172a;
      --color-text-muted: #475569; 
      --color-text-light: #f8fafc;
      
      --color-accent: #1e3a8a; 
      --color-accent-light: #3b82f6;
      
      --color-border: rgba(15, 23, 42, 0.08);
      --color-border-light: rgba(255, 255, 255, 0.08);
      
      --shadow-sm: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 12px 30px -4px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 24px 50px -12px rgba(0, 0, 0, 0.1);
      --shadow-dark: 0 40px 80px -20px rgba(0, 0, 0, 0.5);
      
      --radius-sm: 4px;
      --radius-md: 12px;
      --radius-lg: 16px;
      
      --container-max: 1240px;
      --transition-smooth: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background-color: var(--color-accent); color: white; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-bg-darker); /* Fondo oscuro para la portada */
      color: var(--color-text-muted);
      line-height: 1.65;
      font-size: 15px; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden; /* Evita el scroll en esta página puramente de portada */
      transition: opacity 1s ease, filter 1s ease, transform 1s ease; /* Transición global para el body */
    }

    /* Clase que se activa mediante JS al hacer scroll */
    body.page-transitioning {
      opacity: 0 !important;
      filter: blur(15px) !important;
      transform: scale(1.02);
    }

    a { text-decoration: none; color: inherit; }

    /* ==========================================================================
       HERO MINIMALISTA (PORTADA PURA)
       ========================================================================== */
    .hero-minimal {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      /* Velo oscuro sutil sobre la imagen SanHatann.webp */
      background-image: linear-gradient(to bottom, rgba(2, 6, 23, 0.5), rgba(2, 6, 23, 0.85)), url('assets/images/SanHatann.webp');
      background-size: cover;
      background-position: center;
      padding: 2rem;
    }

    .hero-minimal-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Tipografía Pequeña y Elegante (Minimalista) */
    .hero-minimal-brand {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 3rem;
    }

    .hero-minimal h1 {
      font-size: clamp(1.2rem, 2.5vw, 1.8rem); /* Tipografía pequeña, elegante y centrada */
      font-weight: 300; 
      letter-spacing: 0.08em;
      color: #ffffff;
      line-height: 1.8;
      text-wrap: balance;
      margin-bottom: 3rem;
      text-transform: uppercase;
    }

    .hero-minimal .divider-line {
      width: 40px;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.3);
      margin-bottom: 3rem;
    }

    /* ==========================================================================
       INDICADOR DE SCROLL ANIMADO
       ========================================================================== */
    .scroll-indicator-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      animation: pulse 2s infinite;
      transition: color 0.3s;
    }
    .scroll-indicator-wrap:hover {
      color: #ffffff;
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(5px); }
    }

    /* ==========================================================================
       ANIMACIONES Y PRELOADER
       ========================================================================== */
    .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    .fade-in-up.is-visible { opacity: 1; transform: translateY(0); }
    
    /* Se cambió la transición de transform 1s a transform 2.5s para que suba más lento */
    .premium-preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--color-bg-darker); z-index: 999999; display: flex; justify-content: center; align-items: center; transition: transform 2.5s cubic-bezier(0.77, 0, 0.175, 1); }
    .premium-preloader.hide { transform: translateY(-100%); }
    .preloader-brand { color: white; font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; overflow: hidden; text-align: center; }
    .preloader-brand span { display: block; transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
    .premium-preloader.active span { transform: translateY(0); }
    
    .premium-noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
  </style>
</head>
<body>

  <!-- ELEMENTOS PREMIUM -->
  <div class="premium-preloader">
    <div class="preloader-brand"><span>Marchi & Cía</span></div>
  </div>
  <div class="premium-noise"></div>

  <main>
    <!-- PORTADA MINIMALISTA (IMAGEN EXTERNA DE FONDO) -->
    <section class="hero-minimal fade-in-up">
      <div class="hero-minimal-content">
        
        <div class="hero-minimal-brand">Marchi & Cía</div>
        
        <!-- Leyenda minimalista con tipografía pequeña y espaciada -->
        <h1>Litigios complejos<br>resolución de controversias</h1>
        
        <div class="divider-line"></div>
        
        <!-- Indicador visual de Scroll para transición dinámica -->
        <div class="scroll-indicator-wrap" onclick="triggerTransition()">
          <span>Conocer la Firma</span>
          <div class="scroll-line"></div>
        </div>
        
      </div>
    </section>
  </main>

  <!-- SCRIPT PARA ANIMACIONES Y TRANSICIÓN DINÁMICA -->
  <script>
    // Variable para evitar que la transición se dispare varias veces
    let isTransitioning = false;

    // Función que ejecuta el blur y redirige
    function triggerTransition() {
      if (isTransitioning) return;
      isTransitioning = true;
      
      // Agrega la clase que hace el fade-out y el blur
      document.body.classList.add('page-transitioning');
      
      // Guardamos un aviso temporal para que inicio.html sepa que venimos de la transición
      sessionStorage.setItem('skipLoader', 'true');
      
      // Espera 1 segundo (lo que dura la transición CSS) y luego cambia de página
      setTimeout(() => {
        window.location.href = 'inicio.html';
      }, 1000); 
    }

    document.addEventListener("DOMContentLoaded", function() {
      // 1. Animación de entrada inicial (Fade-in-up)
      setTimeout(() => {
        document.querySelectorAll('.fade-in-up').forEach((el) => {
          el.classList.add('is-visible');
        });
      }, 100); 

      // 2. Preloader Animación
      const preloader = document.querySelector('.premium-preloader');
      if(preloader) {
        setTimeout(() => preloader.classList.add('active'), 50); // El texto aparece casi inmediatamente
        setTimeout(() => {
          preloader.classList.add('hide');
          // Se mantiene la eliminación en 2500ms para permitir que la lenta animación en CSS termine de subir
          setTimeout(() => preloader.remove(), 2500); 
        }, 500); // Reducido significativamente para que empiece a subir sin quedarse estancado abajo
      }

      // ==========================================
      // DETECCIÓN DE SCROLL PARA LA TRANSICIÓN
      // ==========================================

      // Para el ratón o trackpad en PC
      window.addEventListener('wheel', (e) => {
        if (e.deltaY > 0) { // Si el usuario desliza hacia abajo
          triggerTransition();
        }
      });

      // Para dispositivos móviles (gesto de deslizar hacia arriba)
      let touchStartY = 0;
      window.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
      });
      window.addEventListener('touchmove', (e) => {
        let touchEndY = e.touches[0].clientY;
        if (touchStartY - touchEndY > 30) { // Tolerancia para evitar toques accidentales
          triggerTransition();
        }
      });

      // Para navegación por teclado (Flecha abajo, Barra espaciadora, Page Down)
      window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
          triggerTransition();
        }
      });
    });
  </script>
</body>
</html>
